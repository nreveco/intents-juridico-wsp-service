services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama-local
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 24h
    ports:
      - "11435:11434"
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  ollama-init:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-qwen2.5:7b} && ollama pull ${OLLAMA_VISION_MODEL:-llava:7b}"]
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: ollama-nginx
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      - ./nginx.ollama.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  ollama_data:
